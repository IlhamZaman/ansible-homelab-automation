---
- name: Check Proxmox host services
  hosts: proxmox_hosts
  become: true
  tasks:
    - name: Check ssh
      ansible.builtin.systemd:
        name: ssh
      register: ssh_status
      failed_when: false
      changed_when: false

    - name: Show ssh status
      ansible.builtin.debug:
        msg: "ssh is {{ ssh_status.status.ActiveState | default('not found') }}"

    - name: Check pveproxy
      ansible.builtin.systemd:
        name: pveproxy
      register: pveproxy_status
      failed_when: false
      changed_when: false

    - name: Show pveproxy status
      ansible.builtin.debug:
        msg: "pveproxy is {{ pveproxy_status.status.ActiveState | default('not found') }}"

    - name: Check pvedaemon
      ansible.builtin.systemd:
        name: pvedaemon
      register: pvedaemon_status
      failed_when: false
      changed_when: false

    - name: Show pvedaemon status
      ansible.builtin.debug:
        msg: "pvedaemon is {{ pvedaemon_status.status.ActiveState | default('not found') }}"

    - name: Check pvestatd
      ansible.builtin.systemd:
        name: pvestatd
      register: pvestatd_status
      failed_when: false
      changed_when: false

    - name: Show pvestatd status
      ansible.builtin.debug:
        msg: "pvestatd is {{ pvestatd_status.status.ActiveState | default('not found') }}"

    - name: Check pve-cluster
      ansible.builtin.systemd:
        name: pve-cluster
      register: pve_cluster_status
      failed_when: false
      changed_when: false

    - name: Show pve-cluster status
      ansible.builtin.debug:
        msg: "pve-cluster is {{ pve_cluster_status.status.ActiveState | default('not found') }}"

    - name: Check prometheus-node-exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
      register: prometheus_node_exporter_status
      failed_when: false
      changed_when: false

    - name: Show prometheus-node-exporter status
      ansible.builtin.debug:
        msg: "prometheus-node-exporter is {{ prometheus_node_exporter_status.status.ActiveState | default('not found') }}"


- name: Check Cloudflare gateway services
  hosts: ubuntu_servers
  become: true
  tasks:
    - name: Check cloudflared
      ansible.builtin.systemd:
        name: cloudflared
      register: cloudflared_status
      failed_when: false
      changed_when: false

    - name: Show cloudflared status
      ansible.builtin.debug:
        msg: "cloudflared is {{ cloudflared_status.status.ActiveState | default('not found') }}"

    - name: Check nginx
      ansible.builtin.systemd:
        name: nginx
      register: nginx_status
      failed_when: false
      changed_when: false

    - name: Show nginx status
      ansible.builtin.debug:
        msg: "nginx is {{ nginx_status.status.ActiveState | default('not found') }}"


- name: Check Fedora Kuma and Homepage services
  hosts: fedora_servers
  become: true
  tasks:
    - name: Check Homepage service
      ansible.builtin.systemd:
        name: homepage
      register: homepage_status
      failed_when: false
      changed_when: false

    - name: Show Homepage status
      ansible.builtin.debug:
        msg: "homepage is {{ homepage_status.status.ActiveState | default('not found') }}"

    - name: Check PM2 service for Uptime Kuma
      ansible.builtin.command: systemctl list-units --type=service | grep pm2
      register: pm2_status
      changed_when: false
      failed_when: false

    - name: Show PM2 service result
      ansible.builtin.debug:
        var: pm2_status.stdout_lines


- name: Check Monitoring LXC services
  hosts: monitoring_servers
  become: true
  tasks:
    - name: Check Prometheus
      ansible.builtin.systemd:
        name: prometheus
      register: prometheus_status
      failed_when: false
      changed_when: false

    - name: Show Prometheus status
      ansible.builtin.debug:
        msg: "prometheus is {{ prometheus_status.status.ActiveState | default('not found') }}"

    - name: Check Grafana
      ansible.builtin.systemd:
        name: grafana-server
      register: grafana_status
      failed_when: false
      changed_when: false

    - name: Show Grafana status
      ansible.builtin.debug:
        msg: "grafana-server is {{ grafana_status.status.ActiveState | default('not found') }}"

    - name: Check Monitoring exporters
      ansible.builtin.systemd:
        name: "{{ item }}"
      loop:
        - prometheus-node-exporter
        - prometheus-pve-exporter
        - graphite_exporter
      register: monitoring_exporter_status
      failed_when: false
      changed_when: false

    - name: Show Monitoring exporter status
      ansible.builtin.debug:
        msg: >-
          {{ item.item }} is
          {{ item.status.ActiveState | default('not found') }}
      loop: "{{ monitoring_exporter_status.results }}"
      loop_control:
        label: "{{ item.item }}"


