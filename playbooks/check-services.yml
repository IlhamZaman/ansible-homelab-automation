        msg: "Technitium dns service is {{ technitium_status.status.ActiveState | default('not found') }}"


- name: Check TrueNAS middleware and managed services
  hosts: truenas_servers
  become: false
  gather_facts: false
  tasks:
    - name: Check TrueNAS middleware readiness
      ansible.builtin.raw: /usr/bin/midclt call system.ready
      register: truenas_ready
      changed_when: false

    - name: Show TrueNAS middleware status
      ansible.builtin.debug:
        msg: "TrueNAS middleware ready: {{ truenas_ready.stdout | trim }}"

    - name: Query TrueNAS services
      ansible.builtin.raw: /usr/bin/midclt call service.query
      register: truenas_services_raw
      changed_when: false
      failed_when: false

    - name: Show TrueNAS services raw output
      ansible.builtin.debug:
        msg: "{{ truenas_services_raw.stdout_lines }}"
      when: truenas_services_raw.rc == 0

