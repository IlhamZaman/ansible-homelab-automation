---
- name: Install baseline packages on Debian and Ubuntu VMs
  hosts: ubuntu_servers:hermes_servers:debian_servers
  become: true

  tasks:
    - name: Install useful packages
      ansible.builtin.apt:
        name:
          - fastfetch
          - curl
          - wget
          - git
          - htop
          - nano
          - vim
          - unzip
          - tar
          - ca-certificates
          - net-tools
          - dnsutils
        state: present
        update_cache: true


- name: Install baseline packages on Fedora VMs
  hosts: fedora_servers
  become: true

  tasks:
    - name: Install useful packages
      ansible.builtin.dnf:
        name:
          - fastfetch
          - curl
          - wget
          - git
          - htop
          - nano
          - vim
          - unzip
          - tar
          - ca-certificates
          - net-tools
          - bind-utils
        state: present


- name: Install baseline packages on openSUSE VMs
  hosts: opensuse_servers
  become: true

  tasks:
    - name: Install useful packages
      ansible.builtin.command: >
        zypper --non-interactive install
        curl wget fastfetch git htop nano vim unzip tar ca-certificates net-tools bind-utils
      register: zypper_baseline
      changed_when: "'Nothing to do' not in zypper_baseline.stdout"

- name: Install baseline packages on AlmaLinux Management VM
  hosts: management_vm
  become: true

  tasks:
    - name: Install useful Management VM packages
      ansible.builtin.dnf:
        name:
          - fastfetch
          - curl
          - wget
          - git
          - htop
          - nano
          - vim
          - unzip
          - tar
          - ca-certificates
          - net-tools
          - bind-utils
          - dnf-plugins-core
          - python3
          - python3-pip
          - openssh-clients
          - rsync
        state: present
