---
- name: Back up important Linux VM config files
  hosts: linux_servers:monitoring_servers
  become: true
  gather_facts: true

  tasks:
    - name: Create local backup folder for each Linux VM
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Back up SSH server config if it exists
      ansible.builtin.fetch:
        src: /etc/ssh/sshd_config
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/sshd_config"
        flat: true
      failed_when: false

    - name: Back up fstab if it exists
      ansible.builtin.fetch:
        src: /etc/fstab
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/fstab"
        flat: true
      failed_when: false

    - name: Back up hostname
      ansible.builtin.fetch:
        src: /etc/hostname
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/hostname"
        flat: true
      failed_when: false


- name: Back up Proxmox host configuration
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  serial: 1

  tasks:
    - name: Create local Proxmox backup folder
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/proxmox"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Create Proxmox config archive
      ansible.builtin.archive:
        path:
          - /etc/pve
          - /etc/network/interfaces
          - /etc/hosts
          - /etc/hostname
          - /etc/apt
          - /etc/default/grub
        dest: "/tmp/proxmox-config-{{ inventory_hostname }}.tar.gz"
        format: gz
      register: proxmox_config_archive

    - name: Fetch Proxmox config archive
      ansible.builtin.fetch:
        src: "/tmp/proxmox-config-{{ inventory_hostname }}.tar.gz"
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/proxmox/proxmox-config-{{ inventory_hostname }}.tar.gz"
        flat: true

    - name: Remove temporary Proxmox archive
      ansible.builtin.file:
        path: "/tmp/proxmox-config-{{ inventory_hostname }}.tar.gz"
        state: absent


- name: Back up Homepage config files
  hosts: kuma-homepage
  become: true

  tasks:
    - name: Create local Homepage backup folder
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/homepage"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Fetch Homepage config files
      ansible.builtin.fetch:
        src: "{{ item }}"
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/homepage/"
        flat: true
      loop:
        - /opt/homepage/app/config/settings.yaml
        - /opt/homepage/app/config/services.yaml
        - /opt/homepage/app/config/widgets.yaml
        - /opt/homepage/app/config/bookmarks.yaml
      failed_when: false


- name: Back up Cloudflare gateway configs
  hosts: cloudflare-gateway
  become: true

  tasks:
    - name: Create local gateway backup folder
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/gateway"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Fetch Nginx site configs
      ansible.builtin.fetch:
        src: "{{ item }}"
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/gateway/"
        flat: true
      loop:
        - /etc/nginx/sites-available/proxmox
        - /etc/nginx/sites-available/truenas
      failed_when: false


- name: Back up Minecraft server config
  hosts: minecraft
  become: true

  tasks:
    - name: Create local Minecraft backup folder
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/minecraft"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Fetch Minecraft server.properties
      ansible.builtin.fetch:
        src: /opt/minecraft/server.properties
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/minecraft/server.properties"
        flat: true
      failed_when: false

    - name: Fetch Minecraft whitelist
      ansible.builtin.fetch:
        src: /opt/minecraft/whitelist.json
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/minecraft/whitelist.json"
        flat: true
      failed_when: false

- name: Back up AlmaLinux Management VM configuration
  hosts: management_vm
  become: true
  gather_facts: true

  tasks:
    - name: Create local Management VM backup folder
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/management"
        state: directory
        mode: "0750"
      delegate_to: localhost
      become: false

    - name: Back up Management VM system files
      ansible.builtin.fetch:
        src: "{{ item }}"
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/management/"
        flat: true
      loop:
        - /etc/ssh/sshd_config
        - /etc/fstab
        - /etc/hostname
        - /etc/hosts
        - /etc/dnf/dnf.conf
      failed_when: false

    - name: Create Ansible project backup archive
      ansible.builtin.archive:
        path:
          - /home/izaman/homelab/ansible
        dest: /tmp/ansible-project-backup.tar.gz
        format: gz
        exclude_path:
          - /home/izaman/homelab/ansible/backups
          - /home/izaman/homelab/ansible/.git
      failed_when: false

    - name: Fetch Ansible project backup archive
      ansible.builtin.fetch:
        src: /tmp/ansible-project-backup.tar.gz
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/management/ansible-project-backup.tar.gz"
        flat: true
      failed_when: false

    - name: Remove temporary Ansible backup archive
      ansible.builtin.file:
        path: /tmp/ansible-project-backup.tar.gz
        state: absent
      failed_when: false
