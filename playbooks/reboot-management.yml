---
- name: Schedule AlmaLinux Management VM reboot
  hosts: management_vm
  become: true
  gather_facts: false
  serial: 1

  vars:
    confirm_management_reboot: false

  pre_tasks:
    - name: Safety confirmation
      ansible.builtin.fail:
        msg: >
          This playbook will reboot the AlmaLinux Management VM.
          Since this VM runs Ansible, your current Ansible session may disconnect.
          Run again with:
          -e confirm_management_reboot=true
      when: not confirm_management_reboot | bool

    - name: Show reboot message
      ansible.builtin.debug:
        msg: >
          Management VM reboot scheduled.
          Your Management VM will reboot shortly.

  tasks:
    - name: Schedule Management VM reboot
      ansible.builtin.command:
        argv:
          - /usr/sbin/shutdown
          - -r
          - now
          - "Ansible scheduled Management VM reboot"
      changed_when: true
