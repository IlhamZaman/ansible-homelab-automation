---
- name: Reboot Hermes Agent VM only
  hosts: hermes_servers
  become: true
  gather_facts: false
  serial: 1

  vars:
    confirm_hermes_reboot: false

  pre_tasks:
    - name: Safety confirmation
      ansible.builtin.fail:
        msg: "Refusing to reboot Hermes Agent. Run again with -e confirm_hermes_reboot=true"
      when: not confirm_hermes_reboot | bool

  tasks:
    - name: Reboot Hermes Agent VM
      ansible.builtin.reboot:
        msg: "Reboot triggered by Ansible"
        reboot_timeout: 600
        connect_timeout: 10
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
