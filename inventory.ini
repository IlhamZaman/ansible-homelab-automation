[proxmox_hosts]
proxmox	ansible_host=IP ansible_user=$USER

[management_vm]
management ansible_connection=local ansible_user=$USER

[ubuntu_servers]
cloudflare-gateway ansible_host=IP ansible_user=$USER

[debian_servers]
jellyfin ansible_host=IP ansible_user=$USER
minecraft ansible_host=IP ansible_user=$USER
minecraft2 ansible_host=IP ansible_user=$USER
immich ansible_host=IP ansible_user=$USER

[monitoring_servers]
monitoring-lxc ansible_host=IP ansible_user=$USER

[fedora_servers]
kuma-homepage ansible_host=IP ansible_user=$USER

[opensuse_servers]
technitium ansible_host=IP ansible_user=$USER

[truenas_servers]
truenas ansible_host=IP ansible_user=$USER ansible_ssh_private_key_file=~/.ssh/SSH-KEY-HERE ansible_become=true ansible_become_method=sudo ansible_become_user=root

[linux_servers:children]
ubuntu_servers
debian_servers
fedora_servers
opensuse_servers

[linux_maintenance_targets:children]
linux_servers
proxmox_hosts
management_vm

[maintenance_targets:children]
linux_servers
proxmox_hosts
truenas_servers
management_vm
